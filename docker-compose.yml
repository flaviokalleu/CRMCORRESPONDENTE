version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 99480231a
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5847:5432"
    networks:
      - crm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: unless-stopped
    ports:
      - "6847:6379"
    volumes:
      - redis_data:/data
    networks:
      - crm_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_backend
    restart: unless-stopped
    environment:
      # Servidor
      - NODE_ENV=production
      - PORT=8000
      # Banco de Dados
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=crm
      - DB_USERNAME=postgres
      - DB_PASSWORD=99480231a
      # URLs
      - BASE_URL=https://crm.webba.site
      - BACKEND_URL=https://crm.webba.site
      - FRONTEND_URL=https://crm.webba.site
      - WHATSAPP_BASE_URL=https://crm.webba.site/api/whatsapp
      # Seguranca
      - JWT_SECRET_KEY=crm_webba_jwt_secret_key_super_seguro_2024
      # APIs Externas
      - GEMINI_API_KEY=AIzaSyCwVs-Zf-Re2Nmzw-VG0dNnsJs6as7oxXE
      - MERCADO_PAGO_ACCESS_TOKEN=APP_USR-4684735263326629-061917-6b7dc5ab0cd595e7dea701bce8d92532-1488073343
      - MERCADO_PAGO_PUBLIC_KEY=APP_USR-caf75070-7670-47e2-a376-64f810d2f026
      # Redis
      - REDIS_URL=redis://redis:6379
      # Seeds (true para primeira execucao)
      - RUN_SEEDS=true
    volumes:
      - backend_uploads:/app/uploads
      - backend_sessions:/app/whatsapp_sessions
    ports:
      - "8847:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=https://crm.webba.site/api
        - REACT_APP_WS_URL=wss://crm.webba.site
        - REACT_APP_NOME_SISTEMA=B2M
    container_name: crm_frontend
    restart: unless-stopped
    ports:
      - "3847:80"
    depends_on:
      - backend
    networks:
      - crm_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  crm_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  backend_sessions:
