version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-crm}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-99480231a}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5847:5432"
    networks:
      - crm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-crm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: unless-stopped
    ports:
      - "6847:6379"
    volumes:
      - redis_data:/data
    networks:
      - crm_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-crm}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-99480231a}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your_super_secret_jwt_key_change_me}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - MERCADO_PAGO_ACCESS_TOKEN=${MERCADO_PAGO_ACCESS_TOKEN:-}
      - MERCADO_PAGO_PUBLIC_KEY=${MERCADO_PAGO_PUBLIC_KEY:-}
      - BASE_URL=${BASE_URL:-https://crm.webba.site}
      - BACKEND_URL=${BACKEND_URL:-https://crm.webba.site}
      - FRONTEND_URL=${FRONTEND_URL:-https://crm.webba.site}
      - WHATSAPP_BASE_URL=${WHATSAPP_BASE_URL:-https://crm.webba.site/api/whatsapp}
      - REDIS_URL=redis://redis:6379
    volumes:
      - backend_uploads:/app/uploads
      - backend_sessions:/app/whatsapp_sessions
    ports:
      - "8847:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-https://crm.webba.site/api}
        - REACT_APP_WS_URL=${REACT_APP_WS_URL:-wss://crm.webba.site}
        - REACT_APP_NOME_SISTEMA=${REACT_APP_NOME_SISTEMA:-B2M}
    container_name: crm_frontend
    restart: unless-stopped
    ports:
      - "3847:80"
    depends_on:
      - backend
    networks:
      - crm_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  crm_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  backend_sessions:
